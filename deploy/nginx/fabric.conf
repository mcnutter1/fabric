# Fabric management reverse proxy — fabric.mcnutt.cloud
#
# Terminates TLS and proxies to the local uvicorn (127.0.0.1:8080), including the
# /ws/ui WebSocket used for the real-time console. Obtain certs via certbot:
#   sudo certbot --nginx -d fabric.mcnutt.cloud
#
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name fabric.mcnutt.cloud;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name fabric.mcnutt.cloud;

    ssl_certificate     /etc/letsencrypt/live/fabric.mcnutt.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fabric.mcnutt.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # WebSocket (real-time console updates)
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
