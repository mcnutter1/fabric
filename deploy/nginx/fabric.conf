# Fabric management reverse proxy (reference).
#
# The management installer (scripts/install-management.sh) writes an equivalent
# config automatically and provisions TLS via Let's Encrypt. This file documents
# the manual equivalent: start with the HTTP server block below, then run
#   sudo certbot --nginx -d fabric.example.com -m you@example.com --agree-tos --redirect
# certbot rewrites this block to add the 443 listener + HTTP->HTTPS redirect.
#
# Replace fabric.example.com with your hostname.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name fabric.example.com;

    client_max_body_size 10m;

    # WebSocket (real-time console updates)
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
